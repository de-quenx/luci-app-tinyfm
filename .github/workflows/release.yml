name: Build Packages

on:
  push:
    branches:
      - main
    paths:
      - 'Makefile'
  workflow_dispatch:

jobs:
  # 1. JOB PERSIAPAN: Mengekstrak versi dan membuat wadah Rilis
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      pkg_name: ${{ steps.info.outputs.pkg_name }}
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: 🔖 Extract Version and Package Name
        id: info
        run: |
          PKG_NAME=$(basename ${{ github.repository }})
          PKG_VERSION=$(grep -oP 'PKG_VERSION:=\K.*' Makefile | tr -d '[:space:]')
          echo "pkg_name=$PKG_NAME" >> $GITHUB_OUTPUT
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ steps.info.outputs.pkg_name }} v${{ steps.info.outputs.version }}
          tag_name: ${{ steps.info.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ### Changelog ${{ steps.info.outputs.version }}:
            
            **📦 New build of ${{ steps.info.outputs.pkg_name }}**
            
            - **Supported OpenWrt Versions**: 23.05 (IPK), 24.10 (IPK), 25.12 (APK)
            - **Architecture**: x86_64
            
            **🐞 Bug fixes and improvements**
            **📸 Screenshot of application**
            **📝 Full Changelog**

  # 2. JOB KOMPILASI: Berjalan paralel untuk 23.05, 24.10, dan 25.12
  build:
    name: Build OpenWrt ${{ matrix.os_ver }}
    needs: prepare-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk_tag: 24.10.7
            os_ver: "24.10"
          - arch: x86_64
            sdk_tag: 25.12.5
            os_ver: "25.12"
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ Set up build environment
        run: |
          set -euo pipefail
          PKG_NAME="${{ needs.prepare-release.outputs.pkg_name }}"
          
          # Setup struktur feed untuk SDK Action
          mkdir -p "feeds/$PKG_NAME" artifacts
          rsync -a --delete --exclude='.git/' --exclude='feeds/' --exclude='artifacts/' --exclude='release-artifacts/' ./ "feeds/$PKG_NAME/"
          
          # Mempertahankan skrip custom dari build.yml lama
          chmod +x "feeds/$PKG_NAME/root/usr/bin/tinyfm.sh" || true
          
          # Menambahkan suffix versi OS pada Makefile agar paket tidak bentrok antar versi
          OS_VERSION="${{ matrix.os_ver }}"
          if [ "$OS_VERSION" != "25.12" ]; then
            sed -i "s/^PKG_RELEASE:=.*/&_${OS_VERSION}/" "feeds/$PKG_NAME/Makefile"
          fi

      - name: 🔨 Build package using OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk_tag }}
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          FEED_DIR: ${{ github.workspace }}/feeds
          PACKAGES: ${{ needs.prepare-release.outputs.pkg_name }}
          NO_REFRESH_CHECK: true
          V: s
          IGNORE_ERRORS: "m n"
          
      - name: 📦 Prepare release artifacts
        run: |
          set -euo pipefail
          PKG_NAME="${{ needs.prepare-release.outputs.pkg_name }}"
          mkdir -p "${{ github.workspace }}/release-artifacts"
          
          # Mendukung penemuan format .ipk dan .apk (25.12 menggunakan apk)
          PACKAGE_FILES=$(find "${{ github.workspace }}/artifacts" -type f -name "${PKG_NAME}*.*pk" | sort)
          
          if [ -z "$PACKAGE_FILES" ]; then
            echo "Error: No package file found!"
            exit 1
          fi
          
          for pkg in $PACKAGE_FILES; do
            cp "$pkg" "${{ github.workspace }}/release-artifacts/"
          done
          ls -la "${{ github.workspace }}/release-artifacts/"

      - name: 🚀 Upload release artifacts
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          files: |
            ${{ github.workspace }}/release-artifacts/*
          overwrite_files: true
          fail_on_unmatched_files: true
